<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <meta
      name="description"
      content="搜尋高雄熱門地點，或直接查看目前位置附近的路外停車場即時剩餘空位、距離與導航。"
    >

    <meta
      name="robots"
      content="index,follow"
    >

    <title>
      高雄停車推薦｜附近停車場即時空位與導航
    </title>

    <link
      rel="canonical"
      href="https://wkc50283-star.github.io/kaohsiung-tourist-parking/"
    >

    <link
      rel="stylesheet"
      href="style.css"
    >
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a
          class="site-brand"
          href="index.html"
        >
          高雄停車推薦
        </a>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero">
        <p class="page-eyebrow">
          高雄熱門地點停車
        </p>

        <h1 class="page-title">
          現在要去哪裡？
        </h1>

        <p class="page-intro">
          搜尋熱門地點，或直接查看附近仍有空位的路外停車場。
        </p>
      </section>

      <section
        class="location-panel homepage-action-panel"
        aria-labelledby="homepage-search-title"
      >
        <h2
          id="homepage-search-title"
          class="section-title"
        >
          搜尋熱門地點
        </h2>

        <label
          for="hotspot-search-input"
          class="visually-hidden"
        >
          輸入高雄熱門地點名稱
        </label>

        <input
          id="hotspot-search-input"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="例如：駁二、巨蛋、瑞豐夜市"
          aria-label="輸入高雄熱門地點名稱"
        >

        <button
          id="hotspot-search-button"
          class="primary-button"
          type="button"
        >
          搜尋停車場
        </button>

        <p
          id="homepage-message"
          class="status-message"
          aria-live="polite"
          hidden
        ></p>

        <div
          class="homepage-divider"
          role="separator"
          aria-label="或"
        >
          <span>或</span>
        </div>

        <button
          id="view-nearby-button"
          class="secondary-action-button"
          type="button"
        >
          查看附近停車場
        </button>

        <p
          id="location-status"
          class="status-message"
          aria-live="polite"
          hidden
        ></p>
      </section>

      <section
        class="parking-section homepage-hotspot-section"
        aria-labelledby="hotspot-list-title"
      >
        <div class="section-heading">
          <div>
            <p class="page-eyebrow">
              已完成測試
            </p>

            <h2
              id="hotspot-list-title"
              class="section-title"
            >
              熱門地點
            </h2>
          </div>
        </div>

        <div
          id="hotspot-list"
          aria-live="polite"
        ></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        即時空位可能隨車輛進出變動，實際狀況請以現場為準。
      </p>
    </footer>

    <noscript>
      <p class="error-message">
        此頁面需要啟用 JavaScript，才能搜尋附近停車場。
      </p>
    </noscript>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
