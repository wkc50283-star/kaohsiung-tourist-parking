<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <meta name="robots" content="noindex,nofollow">

    <meta
      name="description"
      content="輸入高雄市地址，搜尋附近仍有空位的路外停車場。此頁目前為功能測試版。"
    >

    <title>輸入地址搜尋附近停車場｜高雄停車</title>

    <link rel="stylesheet" href="style-v4.css">

    <style>
      .address-search-main {
        width: min(100% - 24px, 760px);
        margin: 18px auto 52px;
      }

      .address-search-card {
        padding: 20px;
        border: 1px solid #dce7ef;
        border-radius: 22px;
        background: #ffffff;
        box-shadow: 0 8px 22px rgba(36, 80, 112, 0.08);
      }

      .address-search-eyebrow {
        margin: 0;
        color: #176fa8;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .address-search-title {
        margin: 7px 0 0;
        color: #123a5b;
        font-size: 28px;
        line-height: 1.25;
      }

      .address-search-description {
        margin: 11px 0 0;
        color: #687b8d;
        font-size: 15px;
        line-height: 1.75;
      }

      .address-search-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 18px;
      }

      .address-search-input {
        min-width: 0;
        padding: 14px 15px;
        border: 1px solid #cfdce6;
        border-radius: 14px;
        background: #ffffff;
        color: #17354f;
        font-size: 16px;
        outline: none;
      }

      .address-search-input:focus {
        border-color: #74b5de;
        box-shadow: 0 0 0 3px rgba(93, 168, 214, 0.16);
      }

      .address-search-button {
        padding: 0 16px;
        border: 0;
        border-radius: 14px;
        background: #176fa8;
        color: #ffffff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }

      .address-search-status {
        margin: 15px 0 0;
        padding: 12px 14px;
        border: 1px solid #f0d894;
        border-radius: 14px;
        background: #fff9e7;
        color: #8b6a18;
        font-size: 14px;
        line-height: 1.65;
      }

      .address-search-note {
        margin-top: 16px;
        padding: 16px;
        border: 1px solid #dce7ef;
        border-radius: 18px;
        background: #ffffff;
      }

      .address-search-note h2 {
        margin: 0;
        color: #123a5b;
        font-size: 18px;
      }

      .address-search-note p {
        margin: 8px 0 0;
        color: #6b7f90;
        font-size: 14px;
        line-height: 1.75;
      }

      @media (max-width: 520px) {
        .address-search-main {
          width: min(100% - 16px, 760px);
          margin-top: 10px;
        }

        .address-search-card {
          padding: 15px;
          border-radius: 18px;
        }

        .address-search-title {
          font-size: 24px;
        }

        .address-search-description {
          font-size: 14px;
        }

        .address-search-input {
          padding: 12px;
          font-size: 15px;
        }

        .address-search-button {
          padding: 0 13px;
          font-size: 15px;
        }
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html">
          <span>高雄停車</span>
        </a>

        <a class="site-header__back-link" href="index.html">
          回首頁
        </a>
      </div>
    </header>

    <main class="address-search-main">
      <section class="address-search-card">
        <p class="address-search-eyebrow">
          新功能測試
        </p>

        <h1 class="address-search-title">
          輸入地址搜尋附近停車場
        </h1>

        <p class="address-search-description">
          輸入高雄市地址後，未來將直接顯示地址附近仍有空位的路外停車場、距離與導航按鈕。
        </p>

        <form id="address-search-form" class="address-search-form">
          <input
            id="address-search-input"
            class="address-search-input"
            type="search"
            inputmode="search"
            autocomplete="street-address"
            placeholder="例如：高雄市鹽埕區大勇路 96 號"
            aria-label="輸入高雄市地址"
          >

          <button
            class="address-search-button"
            type="submit"
          >
            搜尋
          </button>
        </form>

        <p
          id="address-search-status"
          class="address-search-status"
          aria-live="polite"
        >
          TGOS MAP API 目前正在審核中。審核通過後，再接上正式地址定位功能。
        </p>
      </section>

      <section class="address-search-note">
        <h2>
          預計流程
        </h2>

        <p>
          輸入地址 → 取得座標 → 顯示附近仍有空位的路外停車場 → 比較距離、剩餘空位與更新時間 → 一鍵導航。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        高雄停車｜協助駕駛減少繞路找車位。
      </p>
    </footer>

    <script>
      (function () {
        "use strict";

        const form =
          document.querySelector("#address-search-form");

        const status =
          document.querySelector("#address-search-status");

        form.addEventListener("submit", function (event) {
          event.preventDefault();

          status.textContent =
            "TGOS MAP API 尚在審核中，目前先完成介面測試。審核通過後，這裡會直接顯示地址附近停車場。";
        });
      })();
    </script>
  </body>
</html>
