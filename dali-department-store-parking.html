<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <meta name="robots" content="noindex,nofollow">
    <meta
      name="description"
      content="快速查看高雄熱門地點附近路外停車場即時剩餘空位、距離與導航。"
    >

    <title>大立百貨商圈停車場推薦｜附近即時空位與導航</title>

    <link rel="stylesheet" href="style-v4.css">
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html">
          <span>高雄停車</span>
        </a>

        <a class="site-header__back-link" href="index.html">
          回首頁
        </a>
      </div>
    </header>

    <main class="result-main result-main--direct">
      <section
        class="parking-section parking-section--direct"
        aria-labelledby="hotspot-title"
      >
        <div class="section-heading result-heading">
          <div class="result-heading__copy">
            <p class="page-eyebrow">
              即時路外停車場
            </p>

            <h1
              id="hotspot-title"
              class="result-page-title"
            >
              大立百貨商圈停車場推薦
            </h1>

            <p
              id="hotspot-intro"
              class="result-page-intro"
            >
              快速比較大立百貨商圈附近路外停車場的剩餘空位與更新時間。
            </p>
          </div>

          <button
            id="retry-parking-button"
            class="secondary-button"
            type="button"
          >
            重新整理
          </button>
        </div>

        <p
          id="live-status"
          class="status-message"
          aria-live="polite"
        >
          正在讀取即時車位…
        </p>

        <p
          id="parking-summary"
          class="parking-summary"
          aria-live="polite"
        ></p>

        <p
          id="parking-meta"
          class="parking-meta"
        ></p>

        <p
          id="parking-error"
          class="error-message"
          role="alert"
          hidden
        ></p>

        <div
          id="parking-results"
          class="parking-results"
          aria-live="polite"
        ></div>
      </section>

      <section class="page-note">
        <h2 class="section-title">
          使用提醒
        </h2>

        <p>
          系統會優先列出資料來源目前顯示仍有空位的附近停車場。現場狀況可能快速變動，請以停車場入口資訊為準。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        高雄停車｜協助駕駛減少繞路找車位。
      </p>
    </footer>

    <noscript>
      <p class="error-message">
        此頁面需要啟用 JavaScript，才能查看即時停車資料。
      </p>
    </noscript>

    <script src="data.js"></script>
    <script src="parking-core.js"></script>
    <script src="hotspot-live.js"></script>
  </body>
</html>
