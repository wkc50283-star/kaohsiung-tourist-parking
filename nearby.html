<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <meta name="robots" content="noindex,nofollow">
    <meta
      name="description"
      content="查看目前位置或指定地點附近的高雄路外停車場即時剩餘空位、距離與導航。"
    >

    <title>附近停車場｜高雄停車</title>

    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html">
          <span>高雄停車</span>
        </a>

        <a class="site-header__back-link" href="index.html">
          回首頁
        </a>
      </div>
    </header>

    <section class="page-hero page-hero--result">
      <div class="page-hero__content">
        <p class="page-eyebrow">
          即時路外停車場
        </p>

        <h1 id="page-title" class="page-title">
          附近停車場
        </h1>

        <p id="page-intro" class="page-intro">
          快速查看附近仍有空位的路外停車場、距離與導航。
        </p>
      </div>
    </section>

    <main class="result-main">
      <section
        id="location-prompt"
        class="result-section"
        hidden
      >
        <div class="section-heading">
          <h2 class="section-title">
            查看附近停車場
          </h2>
        </div>

        <p class="section-description" style="text-align: left;">
          按下按鈕後，瀏覽器只會取得一次目前位置，不會持續追蹤，也不會保存定位紀錄。
        </p>

        <button
          id="locate-button"
          class="primary-button"
          type="button"
          style="width: 100%; margin-top: 14px;"
        >
          查看附近停車場
        </button>
      </section>

      <section
        id="parking-section"
        class="parking-section"
        aria-labelledby="parking-title"
      >
        <div class="section-heading">
          <div>
            <p class="page-eyebrow">
              即時路外停車場
            </p>

            <h2 id="parking-title" class="section-title">
              附近停車場
            </h2>
          </div>

          <button
            id="relocate-button"
            class="secondary-button"
            type="button"
          >
            重新定位
          </button>
        </div>

        <p
          id="location-status"
          class="status-message"
          aria-live="polite"
        ></p>

        <p
          id="parking-summary"
          class="parking-summary"
          aria-live="polite"
        >
          正在準備附近停車場資料…
        </p>

        <p
          id="parking-meta"
          class="parking-meta"
        ></p>

        <p
          id="parking-error"
          class="error-message"
          role="alert"
          hidden
        ></p>

        <div
          id="parking-results"
          class="parking-results"
          aria-live="polite"
        ></div>
      </section>

      <section class="page-note">
        <h2 class="section-title">
          使用提醒
        </h2>

        <p>
          本站只顯示具備明確座標、可直接導航且仍有空位的路外停車場。距離為直線距離，實際開車路線與行車時間請以 Google 地圖為準。
        </p>

        <p>
          即時空位可能隨車輛進出變動，實際狀況請以現場為準。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        高雄停車｜協助駕駛快速判斷現在往哪裡開，減少繞路找車位。
      </p>
    </footer>

    <noscript>
      <p class="error-message">
        此頁面需要啟用 JavaScript，才能查看附近停車場即時資料。
      </p>
    </noscript>

    <script src="parking-core.js"></script>
    <script src="nearby.js"></script>
  </body>
</html>
