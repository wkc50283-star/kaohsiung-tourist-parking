<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <meta name="robots" content="noindex,nofollow">
    <meta
      name="description"
      content="查看目前位置附近的高雄路外停車場即時剩餘空位、距離與導航。"
    >

    <title>附近停車場｜高雄停車</title>

    <link rel="stylesheet" href="style-v4.css?v=20260615-low-warning-text-only">
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="index.html">
          <span>高雄停車</span>
        </a>

        <a class="site-header__back-link" href="index.html">
          回首頁
        </a>
      </div>
    </header>

    <main class="result-main result-main--direct">
      <section
        id="location-prompt"
        class="result-section parking-section--direct"
        hidden
      >
        <div class="section-heading">
          <h1 class="result-page-title">
            查看附近停車場
          </h1>
        </div>

        <p class="result-page-intro">
          按下按鈕後，瀏覽器只會取得一次目前位置，不會持續追蹤或保存定位紀錄。
        </p>

        <button
          id="locate-button"
          class="primary-button"
          type="button"
          style="width: 100%; margin-top: 10px;"
        >
          查看附近停車場
        </button>
      </section>

      <section
        id="parking-section"
        class="parking-section parking-section--direct"
        aria-labelledby="parking-title"
      >
        <div class="section-heading result-heading">
          <div class="result-heading__copy">
            <p class="page-eyebrow">
              即時路外停車場
            </p>

            <h1
              id="page-title"
              class="result-page-title"
            >
              附近停車場
            </h1>

            <p
              id="page-intro"
              class="result-page-intro"
            >
              快速比較目前位置附近路外停車場的剩餘空位與更新時間。
            </p>
          </div>

          <button
            id="relocate-button"
            class="secondary-button"
            type="button"
          >
            重新定位
          </button>
        </div>

        <p
          id="location-status"
          class="status-message"
          aria-live="polite"
        ></p>

        <p
          id="parking-summary"
          class="parking-summary"
          aria-live="polite"
        ></p>

        <p
          id="parking-meta"
          class="parking-meta"
        ></p>

        <p
          id="parking-error"
          class="error-message"
          role="alert"
          hidden
        ></p>

        <div
          id="parking-results"
          class="parking-results"
          aria-live="polite"
        ></div>
      </section>

      <section class="page-note">
        <h2 class="section-title">
          使用提醒
        </h2>

        <p>
          系統會優先列出資料來源目前顯示仍有空位的附近停車場。現場狀況可能快速變動，請以停車場入口資訊為準。
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        高雄停車｜協助駕駛減少繞路找車位。
      </p>
    </footer>

    <noscript>
      <p class="error-message">
        此頁面需要啟用 JavaScript，才能查看附近停車場即時資料。
      </p>
    </noscript>

    <script src="parking-core.js"></script>
    <script src="nearby.js"></script>
  </body>
</html>
